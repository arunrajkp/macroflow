<!DOCTYPE html>
<!-- Version: 1.0.2 - Force Clear Cache -->
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MacroFlow – Log Intake</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #e8ecf4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .phone {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            background: #fff;
            box-shadow: 0 30px 80px rgba(0, 0, 0, .18);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative
        }

        @media (min-width: 480px) {
            body {
                padding: 20px 16px;
            }

            .phone {
                height: 820px;
                border-radius: 40px;
            }

            .bottom-nav {
                border-radius: 0 0 40px 40px;
            }
        }

        .top-bar {
            padding: 22px 24px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #f0f2f8;
            flex-shrink: 0
        }

        .back-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #1a1f36;
            padding: 4px
        }

        .top-bar h2 {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #1a1f36
        }

        .search-wrap {
            padding: 14px 24px;
            border-bottom: 1px solid #f0f2f8;
            flex-shrink: 0
        }

        .search-row {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .search-input {
            flex: 1;
            border: none;
            border-bottom: 1.5px solid #e0e4f0;
            outline: none;
            font-size: 16px;
            color: #9ba3bf;
            font-family: 'Inter', sans-serif;
            padding: 8px 0;
            background: transparent
        }

        .search-input::placeholder {
            color: #c8cde0
        }

        .search-ico {
            color: #9ba3bf;
            flex-shrink: 0
        }

        .chips {
            display: flex;
            gap: 8px;
            padding: 12px 24px;
            overflow-x: auto;
            flex-shrink: 0;
            border-bottom: 1px solid #f0f2f8
        }

        .chips::-webkit-scrollbar {
            display: none
        }

        .chip {
            padding: 7px 16px;
            border-radius: 50px;
            border: 1.5px solid #e0e4f0;
            font-size: 12px;
            font-weight: 600;
            color: #9ba3bf;
            background: #fff;
            cursor: pointer;
            white-space: nowrap;
            transition: all .2s
        }

        .chip.active {
            background: #4d7cf6;
            border-color: #4d7cf6;
            color: #fff
        }

        .action-row {
            display: flex;
            gap: 12px;
            padding: 8px 24px;
            overflow-x: auto;
            flex-shrink: 0;
            background: #f8fafc;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #fff;
            border: 1px solid #f0f2f8;
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            color: #1a1f36;
            white-space: nowrap;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
            transition: all 0.2s;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .action-btn svg {
            width: 16px;
            height: 16px;
            color: #4d7cf6;
        }

        .fav-btn {
            background: none;
            border: none;
            padding: 4px;
            cursor: pointer;
            color: #c8cde0;
            transition: color 0.2s;
            margin-right: 4px;
        }

        .fav-btn.active {
            color: #f43f5e;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 0 0 120px
        }

        .sec-hdr {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px 10px
        }

        .sec-hdr .title {
            font-size: 22px;
            font-weight: 700;
            color: #1a1f36;
            font-style: italic
        }

        .sec-hdr .view-all {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #9ba3bf;
            text-transform: uppercase;
            cursor: pointer
        }

        .food-item {
            padding: 15px 24px;
            border-bottom: 1px solid #f0f2f8;
            cursor: pointer;
            transition: background .15s;
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .food-item:hover {
            background: #f8f9fe
        }

        .food-item:active {
            background: #eef1fd
        }

        .food-left {
            flex: 1
        }

        .food-name {
            font-size: 16px;
            font-weight: 600;
            color: #1a1f36
        }

        .food-macros {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: .8px;
            color: #9ba3bf;
            text-transform: uppercase;
            margin-top: 3px
        }

        .food-macros .sep {
            margin: 0 6px;
            color: #dde0ea
        }

        .add-food-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: none;
            background: #4d7cf6;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform .15s
        }

        .add-food-btn:hover {
            transform: scale(1.15)
        }

        .add-food-btn.added {
            background: #10b981
        }

        .empty-search {
            text-align: center;
            padding: 40px 24px;
            color: #9ba3bf;
            font-size: 14px
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
            background: #f8f9fe;
            padding: 8px 12px;
            border-radius: 12px;
            width: fit-content;
        }

        .qty-label {
            font-size: 11px;
            font-weight: 700;
            color: #9ba3bf;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .qty-btn {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            border: 1.5px solid #e0e4f0;
            background: #fff;
            color: #1a1f36;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
        }

        .qty-btn:active {
            transform: scale(0.9);
            background: #f0f2f8;
        }

        .qty-val {
            font-size: 15px;
            font-weight: 800;
            color: #4d7cf6;
            min-width: 30px;
            text-align: center;
        }

        .food-macros.scaled {
            color: #4d7cf6;
        }

        /* Action buttons */
        .action-row {
            position: absolute;
            bottom: 72px;
            left: 0;
            right: 0;
            padding: 10px 24px;
            display: flex;
            gap: 12px;
            background: linear-gradient(to top, #fff 80%, transparent)
        }

        .action-btn {
            flex: 1;
            padding: 13px 10px;
            border: 1.5px solid #e0e4f0;
            border-radius: 50px;
            background: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: #9ba3bf;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all .2s
        }

        .action-btn:hover {
            border-color: #4d7cf6;
            color: #4d7cf6
        }

        .action-btn.primary {
            background: #4d7cf6;
            border-color: #4d7cf6;
            color: #fff
        }

        .action-btn.primary:hover {
            background: #3a66e3
        }

        /* Bottom nav */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-top: 1px solid #f0f2f8;
            display: flex;
            align-items: center;
            height: 72px;
            border-radius: 0 0 40px 40px
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            color: #c0c6d9;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: .8px;
            text-transform: uppercase;
            padding: 8px 0;
            text-decoration: none;
            transition: color .2s
        }

        .nav-item.active {
            color: #4d7cf6
        }

        .nav-item svg {
            width: 20px;
            height: 20px
        }

        /* Selected count badge */
        .sel-badge {
            background: #4d7cf6;
            color: #fff;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            margin-left: 6px
        }
    </style>
</head>

<body>
    <div class="phone">
        <div class="top-bar">
            <button class="back-btn" onclick="history.back()">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <polyline points="15 18 9 12 15 6" />
                </svg>
            </button>
            <h2>Log Daily Intake</h2>
            <div style="width:32px"></div>
        </div>

        <div class="search-wrap">
            <div class="search-row">
                <input id="search-input" class="search-input" type="text" placeholder="Find nourishment..."
                    oninput="onSearch(this.value)" />
                <div style="display:flex; align-items:center; gap:8px;">
                    <span class="search-ico" style="position:static; padding:8px; cursor:pointer;"
                        onclick="loadFoods(document.getElementById('search-input').value)">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                            viewBox="0 0 24 24">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                    </span>
                    <label for="ai-camera-input" class="search-ico"
                        style="position:static; padding:8px; cursor:pointer;" title="AI Photo Log">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                            viewBox="0 0 24 24">
                            <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" />
                            <circle cx="12" cy="13" r="4" />
                        </svg>
                        <input type="file" id="ai-camera-input" accept="image/*" capture="environment"
                            style="display:none" onchange="processAIPhoto(this)">
                    </label>
                </div>
            </div>
        </div>

        <div class="chips" id="chip-row">
            <div class="chip" data-type="fav">❤️ Favorites</div>
            <div class="chip active" data-type="Breakfast">Breakfast</div>
            <div class="chip" data-type="Lunch">Lunch</div>
            <div class="chip" data-type="Dinner">Dinner</div>
            <div class="chip" data-type="Snacks">Snacks</div>
        </div>

        <div class="action-row">
            <button class="action-btn" onclick="startScanner()">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M3 7V5a2 2 0 012-2h2m10 0h2a2 2 0 012 2v2m0 10v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2">
                    </path>
                    <rect x="7" y="7" width="10" height="10" rx="1"></rect>
                </svg>
                Scan QR
            </button>
            <button class="action-btn" onclick="startPhotoLog()">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path
                        d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z">
                    </path>
                    <circle cx="12" cy="13" r="3"></circle>
                </svg>
                Photo Log
            </button>
        </div>

        <div class="content">
            <div class="sec-hdr">
                <span class="title">Recent</span>
                <span class="view-all" id="sel-count"></span>
            </div>
            <div id="food-list">
                <div class="spinner">⏳ Loading foods…</div>
            </div>
        </div>

        <div class="action-row">
            <button class="action-btn" onclick="openAddMeal()">
                <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                </svg>
                Custom Meal
            </button>
            <button class="action-btn primary" id="log-selected-btn" onclick="logSelectedFoods()">
                Log Selected <span class="sel-badge" id="sel-badge-num">0</span>
            </button>
        </div>

        <div class="bottom-nav">
            <a class="nav-item" href="dashboard.html">
                <svg fill="currentColor" viewBox="0 0 24 24">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
                </svg>
                Today
            </a>
            <a class="nav-item" href="stats.html">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                </svg>
                Stats
            </a>
            <a class="nav-item active" href="log-intake.html">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
                Log
            </a>
            <a class="nav-item" href="checklist.html">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <polyline points="9 11 12 14 22 4" />
                    <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
                </svg>
                Checklist
            </a>
            <a class="nav-item" href="profile.html">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="12" cy="7" r="4" />
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                </svg>
                Profile
            </a>
        </div>
    </div>

    <script>
        let currentUser = null;
        let selectedMealType = 'Breakfast';
        let allFoods = [];
        let selectedFoods = new Map(); // id -> food object

        async function init() {
            currentUser = await requireAuth();
            if (!currentUser) return;

            // Load favorites first if needed
            const { data: favs } = await getFavorites(currentUser.id);
            favoriteIds = new Set((favs || []).map(f => f.id));

            await loadFoods();
        }

        let favoriteIds = new Set();

        async function loadFoods(query = '') {
            const list = document.getElementById('food-list');
            list.innerHTML = '<div class="spinner">⏳ Loading…</div>';
            const { data, error } = await searchFoods(currentUser.id, query);
            if (error) { list.innerHTML = '<div class="empty-search">❌ Failed to load foods</div>'; return; }
            allFoods = data || [];
            renderFoods();
        }

        function renderFoods() {
            const list = document.getElementById('food-list');
            if (!allFoods.length) {
                if (selectedMealType === 'fav') {
                    list.innerHTML = '<div class="empty-search">No favorites yet.<br>Tap the Heart icon on any food! ❤️</div>';
                } else {
                    list.innerHTML = '<div class="empty-search">No foods found.<br>Add a custom meal below! 🍽️</div>';
                }
                return;
            }
            list.innerHTML = allFoods.map(f => {
                const sel = selectedFoods.get(f.id);
                const isSel = !!sel;
                const qty = isSel ? sel.quantity : 1;

                // Scale macros if selected
                const kcal = (f.kcal * qty).toFixed(0);
                const protein = (f.protein_g * qty).toFixed(1);
                const carbs = (f.carbs_g * qty).toFixed(1);
                const fats = (f.fats_g * qty).toFixed(1);

                return `
    <div class="food-item" id="fi-${f.id}">
      <button class="fav-btn ${favoriteIds.has(f.id) ? 'active' : ''}" onclick="onToggleFav(event, ${f.id})">
        ${favoriteIds.has(f.id) ? '❤️' : '♡'}
      </button>
      <div class="food-left" onclick="toggleFood(${f.id})">
        <div class="food-name">${f.name}<small style="color:#c0c6d9;font-weight:400;font-size:11px"> ${f.serving_size ? '· ' + f.serving_size : ''}</small></div>
        <div class="food-macros ${isSel ? 'scaled' : ''}">
          <div style="margin-bottom:2px">${kcal} KCAL <span class="sep">|</span> ${protein}g P <span class="sep">|</span> ${carbs}g C <span class="sep">|</span> ${fats}g F</div>
          <div style="font-size:10px; opacity:0.7">
            Fib: ${(f.fiber_g || 0) * qty}g · Sug: ${(f.sugar_g || 0) * qty}g · Sod: ${(f.sodium_mg || 0) * qty}mg · Chol: ${(f.cholesterol_mg || 0) * qty}mg
          </div>
        </div>
        ${isSel ? `
        <div class="qty-controls" onclick="event.stopPropagation()">
            <span class="qty-label">Quantity</span>
            <button class="qty-btn" onclick="updateQty(${f.id}, -0.5)">-</button>
            <span class="qty-val">${qty}</span>
            <button class="qty-btn" onclick="updateQty(${f.id}, 0.5)">+</button>
        </div>` : ''}
      </div>
      <button class="add-food-btn ${isSel ? 'added' : ''}" onclick="toggleFood(${f.id})" title="${isSel ? 'Remove' : 'Add'}">
        ${isSel ? '✓' : '+'}
      </button>
    </div>`;
            }).join('');
        }

        function toggleFood(id) {
            const food = allFoods.find(f => f.id === id);
            if (!food) return;
            if (selectedFoods.has(id)) {
                selectedFoods.delete(id);
            } else {
                selectedFoods.set(id, { ...food, quantity: 1 });
            }
            updateSelBadge();
            renderFoods();
        }

        function updateQty(id, delta) {
            const sel = selectedFoods.get(id);
            if (!sel) return;
            sel.quantity = Math.max(0.5, sel.quantity + delta);
            renderFoods();
        }

        function updateSelBadge() {
            const n = selectedFoods.size;
            document.getElementById('sel-badge-num').textContent = n;
            document.getElementById('sel-count').textContent = n > 0 ? n + ' selected' : '';
        }

        let searchTimer;
        function onSearch(val) {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => loadFoods(val), 350);
        }

        document.getElementById('chip-row').addEventListener('click', e => {
            const chip = e.target.closest('.chip');
            if (!chip) return;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            selectedMealType = chip.dataset.type;

            if (selectedMealType === 'fav') {
                loadFavoritesOnly();
            } else {
                loadFoods();
            }
        });

        async function loadFavoritesOnly() {
            const list = document.getElementById('food-list');
            list.innerHTML = '<div class="spinner">⏳ Loading Favorites…</div>';
            const { data, error } = await getFavorites(currentUser.id);
            if (error) { list.innerHTML = '<div class="empty-search">❌ Failed to load favorites</div>'; return; }
            allFoods = data || [];
            renderFoods();
        }

        async function onToggleFav(e, foodId) {
            e.stopPropagation();
            const btn = e.currentTarget;
            const isAdding = !favoriteIds.has(foodId);

            if (isAdding) {
                favoriteIds.add(foodId);
                btn.classList.add('active');
                btn.innerHTML = '❤️';
                showToast('Added to favorites', 'success');
            } else {
                favoriteIds.delete(foodId);
                btn.classList.remove('active');
                btn.innerHTML = '♡';
                showToast('Removed from favorites', 'success');
                // If we are in favorites tab, remove it immediately
                if (selectedMealType === 'fav') {
                    allFoods = allFoods.filter(f => f.id !== foodId);
                    renderFoods();
                }
            }

            const { error } = await toggleFavorite(currentUser.id, foodId);
            if (error) {
                showToast('Error: ' + error.message, 'error');
                // Revert UI if needed
            }
        }

        async function processAIPhoto(input) {
            if (!input.files || !input.files[0]) return;

            const list = document.getElementById('food-list');
            const originalHTML = list.innerHTML;
            list.innerHTML = `
                <div style="text-align:center; padding:40px 20px;">
                    <div class="spinner"></div>
                    <div style="margin-top:15px; font-weight:700; color:#1a1f36;">AI Analyzing Photo...</div>
                    <div style="font-size:12px; color:#9ba3bf; margin-top:5px;">Identifying food from image</div>
                </div>
            `;

            // Simulate AI delay
            await new Promise(r => setTimeout(r, 1500));

            // Select 1-2 random items from library to simulate detection
            const count = Math.random() > 0.7 ? 2 : 1;
            const detectedItems = [];
            for (let i = 0; i < count; i++) {
                const item = allFoods[Math.floor(Math.random() * allFoods.length)];
                if (item && !selectedFoods.has(item.id)) detectedItems.push(item);
            }

            if (detectedItems.length > 0) {
                detectedItems.forEach(item => {
                    selectedFoods.set(item.id, { ...item, quantity: 1 });
                });
                showToast(`AI Detected: ${detectedItems.map(i => i.name).join(', ')}`, 'success');
                updateSelBadge();
                renderFoods();

                // Highlight the first detected item
                const el = document.getElementById('fi-' + detectedItems[0].id);
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else {
                showToast('AI could not identify the food. Try searching manually.', 'error');
                list.innerHTML = originalHTML;
            }
            input.value = ''; // Reset input
        }

        function startScanner() {
            // Simulated QR Scan
            showToast('Initializing QR Scanner...', 'success');
            setTimeout(() => {
                const randomFood = allFoods[Math.floor(Math.random() * allFoods.length)];
                if (randomFood) {
                    if (confirm(`QR Code Detected: ${randomFood.name}. Add to current selection?`)) {
                        selectedFoods.set(randomFood.id, { ...randomFood, quantity: 1 });
                        updateSelBadge();
                        renderFoods();
                        showToast(`${randomFood.name} added to selection`, 'success');
                    }
                }
            }, 1000);
        }

        function startPhotoLog() {
            document.getElementById('ai-camera-input').click();
        }

        async function logSelectedFoods() {
            if (selectedFoods.size === 0) { showToast('Select at least one food item', 'error'); return; }
            const btn = document.getElementById('log-selected-btn');
            showLoading(true, btn);

            const items = Array.from(selectedFoods.values()).map(f => ({
                id: f.id,
                name: f.name,
                quantity: f.quantity,
                kcal: f.kcal * f.quantity,
                protein_g: f.protein_g * f.quantity,
                carbs_g: f.carbs_g * f.quantity,
                fats_g: f.fats_g * f.quantity,
                fiber_g: (f.fiber_g || 0) * f.quantity,
                sugar_g: (f.sugar_g || 0) * f.quantity,
                sodium_mg: (f.sodium_mg || 0) * f.quantity,
                cholesterol_mg: (f.cholesterol_mg || 0) * f.quantity
            }));

            const { error } = await logMeal({
                userId: currentUser.id,
                mealType: selectedMealType,
                logDate: todayISO(),
                items
            });

            if (error) {
                showToast('Failed: ' + error.message, 'error');
                showLoading(false, btn);
                return;
            }

            showToast('✅ ' + selectedMealType + ' logged!');
            setTimeout(() => window.location.href = 'dashboard.html', 900);
        }

        function openAddMeal() {
            // New filename to bypass any potential server/browser cache issues
            window.location.href = 'addmeal.html?type=' + encodeURIComponent(selectedMealType);
        }

        init();
    </script>
</body>

</html>
